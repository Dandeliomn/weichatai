# =============================================================================
# 微信情感陪伴平台 - Nginx 反向代理配置
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # 性能优化
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 500m;  # 允许上传 200MB 文件

    # Gzip 压缩
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # Docker内部DNS，避免容器重启后IP缓存问题
    resolver 127.0.0.11 valid=30s;

    # =========================================================================
    # HTTP 服务 — 使用变量 proxy_pass 实现动态 DNS 解析
    # Docker 容器重启会变 IP，变量方式配合 resolver 可自动刷新
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # API 服务 (变量方式实现动态DNS)
        set $api_backend "http://api-server:3000";
        set $dashboard_backend "http://dashboard:80";
        # openilink-hub 已废弃

        # 健康检查
        location /health {
            proxy_pass $api_backend;
            proxy_set_header Host $host;
        }

        # API 服务
        location /api/ {
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置 (导入大文件需要较长时间)
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Webhook (WeClaw 回调)
        location /webhook {
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 上传文件静态服务
        location /uploads/ {
            alias /var/www/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 表情包静态服务
        location /stickers/ {
            alias /usr/share/nginx/stickers/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 队列统计
        location /stats {
            proxy_pass $api_backend;
            proxy_set_header Host $host;
        }

        # Weixin Bridge 已废弃 — QR 功能由 Hermes 宿主机处理

        # MinIO 代理 — presigned URL 通过 nginx 访问
        location /minio/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 1g;
        }

        # Dashboard SPA — /bridge 由 React Router 处理
        location = /bridge {
            proxy_pass $dashboard_backend;
            proxy_set_header Host $host;
        }

        location = /bridge/ {
            rewrite ^ /bridge-gate.html break;
            proxy_pass $dashboard_backend;
        }

        # OpeniLink Hub 已废弃 — 微信连接由 Hermes 宿主机处理

        # Dashboard SPA (must be after /bridge/)
        location / {
            proxy_pass $dashboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
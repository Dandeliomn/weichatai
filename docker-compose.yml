# =============================================================================
# 微信情感陪伴AI服务 - Docker Compose 编排文件
# 一键部署: docker compose up -d
# =============================================================================

name: wechat-companion

services:
  # ===========================================================================
  # WeClaw 微信桥接层 - 处理微信扫码登录、消息收发
  # 基于 WeClawBot-API (https://github.com/Cp0204/WeClawBot-API)
  # 使用 expect(unbuffer) 提供伪终端以捕获 incoming 消息
  # ===========================================================================
  weclaw-bridge:
    build:
      context: .
      dockerfile: weclaw-bridge.Dockerfile
    container_name: weclaw-bridge
    ports:
      - "26322:26322"
    volumes:
      - weclaw_config:/app/config
      - ./bridge-forward.sh:/bridge-forward.sh:ro
    restart: unless-stopped
    networks:
      - companion-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26322/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===========================================================================
  # SillyTavern - 角色引擎 (REST API 直连，替代 ChatBridge WebSocket)
  # relay (hermes-st-relay.js) 通过 HTTP REST 直接调用 ST API，
  # 无需浏览器/WebSocket/伪终端环境
  # 首次配置: 在 ST Web UI (http://localhost:8000) 设置 API Key 和角色卡
  # ===========================================================================
  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:latest
    container_name: sillytavern
    ports:
      - "8000:8000"
    volumes:
      - st_data:/home/node/app/data
      - ./st-config.yaml:/home/node/app/config.yaml:ro
    environment:
      - SILLYTAVERN_PORT=8000
      - SILLYTAVERN_PROTOCOL=http
    restart: unless-stopped
    networks:
      - companion-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # 主应用 - Express API 服务器
  # 接收WeClaw转发消息，将任务入队，返回占位回复
  # ===========================================================================
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weclaw-api-server
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - api_data:/app/data
      - uploads_data:/app/uploads
      - ./stickers:/app/stickers
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - companion-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===========================================================================
  # BullMQ Worker - 异步处理消息队列
  # 独立进程: 读取短期记忆、长期记忆、情绪分析、调用DeepSeek、发送回复
  # ===========================================================================
  bull-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weclaw-bull-worker
    command: ["node", "--max-old-space-size=4096", "dist/worker.js"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/uploads
      - ./stickers:/app/stickers
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*worker' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - companion-net
    deploy:
      resources:
        limits:
          memory: 5G

  # ===========================================================================
  # 主动关怀定时任务 - 每天8:00/13:00/20:00发送关怀消息
  # ===========================================================================
  care-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weclaw-care-scheduler
    command: ["node", "dist/care/scheduler.js"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*scheduler' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - companion-net

  # ===========================================================================
  # Redis - 短期记忆存储 + BullMQ 队列后端
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: weclaw-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --save 900 1
      --save 300 10
      --save 60 10000
    restart: unless-stopped
    networks:
      - companion-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # PostgreSQL - 长期记忆持久化存储
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: weclaw-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weclaw_companion}
      POSTGRES_USER: ${POSTGRES_USER:-weclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weclaw_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/init-db-v2.sql:/docker-entrypoint-initdb.d/02-init-v2.sql:ro
      - ./scripts/init-db-v3.sql:/docker-entrypoint-initdb.d/03-init-v3.sql:ro
      - ./scripts/init-db-v4.sql:/docker-entrypoint-initdb.d/04-init-v4.sql:ro
    restart: unless-stopped
    networks:
      - companion-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weclaw} -d ${POSTGRES_DB:-weclaw_companion}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # MinIO - 对象存储 (可选，用于文件持久化)
  # 如果不需要OSS，可以注释掉此服务
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: weclaw-minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - companion-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Nginx 反向代理 (可选)
  # 统一入口，/api/* → Express, /uploads/* → 静态文件
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: weclaw-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/var/www/uploads:ro
    restart: unless-stopped
    depends_on:
      - api-server
    networks:
      - companion-net

  # ===========================================================================
  # FastAgent - WeChat 消息收发 (支持webhook转发)
  # ===========================================================================
  fastagent:
    build:
      context: .
      dockerfile: fastagent.Dockerfile
    container_name: weclaw-fastagent
    ports:
      - "18789:18789"
    volumes:
      - fastagent_data:/app/data
      - ./fastagent-config.json:/app/config/config.json:ro
    environment:
      - IM_GATEWAY_ALLOW_ALL_PERMISSIONS=true
      - IM_GATEWAY_WORKSPACE_DIR=/app/data
      - IM_GATEWAY_DATA_DIR=/app/data
      - IM_GATEWAY_AGENT_ID=companion
    restart: unless-stopped
    networks:
      - companion-net

  # ===========================================================================
  # OpeniLink Hub - 微信桥接管理平台 (支持webhook)
  # Web UI: http://localhost:9800
  # ===========================================================================
  openilink-hub:
    image: ghcr.io/openilink/openilink-hub:latest
    container_name: weclaw-openilink
    ports:
      - "9800:9800"
    volumes:
      - openilink_data:/var/lib/openilink-hub
    restart: unless-stopped
    networks:
      - companion-net

  # ===========================================================================
  # Dashboard - React Admin SPA
  # ===========================================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: weclaw-dashboard
    restart: unless-stopped
    depends_on:
      - api-server
    networks:
      - companion-net

# =============================================================================
# 持久化卷
# =============================================================================
volumes:
  openilink_data:
    driver: local

  fastagent_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  weclaw_config:
    driver: local
  api_data:
    driver: local
  uploads_data:
    driver: local
  st_data:
    driver: local
  minio_data:
    driver: local

# =============================================================================
# 内部网络
# =============================================================================
networks:
  companion-net:
    driver: bridge
    name: weclaw-companion-net

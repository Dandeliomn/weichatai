# =============================================================================
# 微信情感陪伴AI服务 - Docker Compose 编排文件
# 一键部署: docker compose up -d
# =============================================================================

name: wechat-companion

services:
  # ===========================================================================
  # 主应用 - Express API 服务器
  # 接收WeClaw转发消息，将任务入队，返回占位回复
  # ===========================================================================
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weclaw-api-server
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - api_data:/app/data
      - uploads_data:/app/uploads
      - ./stickers:/app/stickers
      - ./st-data:/app/st-data
      # ⚠️ 安全警告: Docker 套接字挂载使容器可控制宿主机 Docker
      # 如果 api-server 被攻破，攻击者可创建任意容器
      # 建议: 使用 Docker-in-Docker 或 Unix socket 代理替代
      - /var/run/docker.sock:/var/run/docker.sock
      # Docker CLI (bind-mount to avoid glibc/musl conflict)
      - /usr/bin/docker:/usr/local/bin/docker:ro
      - /lib64/ld-linux-x86-64.so.2:/lib64/ld-linux-x86-64.so.2:ro
      - /usr/lib/x86_64-linux-gnu/libc.so.6:/usr/lib/x86_64-linux-gnu/libc.so.6:ro
      - /usr/libexec/docker/cli-plugins/docker-compose:/usr/local/lib/docker/cli-plugins/docker-compose:ro
      # fastagent_data removed (Hermes replaces FastAgent)
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - companion-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===========================================================================
  # Redis - 短期记忆存储 + BullMQ 队列后端
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: weclaw-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --save 900 1
      --save 300 10
      --save 60 10000
    restart: unless-stopped
    networks:
      - companion-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # PostgreSQL - 长期记忆持久化存储
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: weclaw-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weclaw_companion}
      POSTGRES_USER: ${POSTGRES_USER:-weclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weclaw_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/init-db-v2.sql:/docker-entrypoint-initdb.d/02-init-v2.sql:ro
      - ./scripts/init-db-v3.sql:/docker-entrypoint-initdb.d/03-init-v3.sql:ro
      - ./scripts/init-db-v4.sql:/docker-entrypoint-initdb.d/04-init-v4.sql:ro
      - ./scripts/init-db-v5.sql:/docker-entrypoint-initdb.d/05-init-v5.sql:ro
      - ./scripts/init-db-v6.sql:/docker-entrypoint-initdb.d/06-init-v6.sql:ro
    restart: unless-stopped
    networks:
      - companion-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weclaw} -d ${POSTGRES_DB:-weclaw_companion}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # MinIO - 对象存储 (可选，用于文件持久化)
  # 如果不需要OSS，可以注释掉此服务
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: weclaw-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - companion-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Nginx 反向代理 (可选)
  # 统一入口，/api/* → Express, /uploads/* → 静态文件
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: weclaw-nginx
    ports:
      - "8080:80"
      - "8082:8082"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/var/www/uploads:ro
      - ./stickers:/usr/share/nginx/stickers:ro
    restart: unless-stopped
    depends_on:
      - api-server
    networks:
      - companion-net


  # ===========================================================================
  # Hermes Agent - 微信消息处理 + AI角色扮演
  # 替换 FastAgent + api-server 消息链路
  # ===========================================================================
  hermes-companion:
    build:
      context: .
      dockerfile: hermes.Dockerfile
    container_name: hermes-companion
    ports:
      - "18789:18789"
    volumes:
      - hermes_data:/app/data
      - ./hermes-config.yaml:/app/config/config.yaml:ro
      - ./scripts/hermes-webhook-bridge.js:/app/scripts/webhook-bridge.js:ro
    environment:
      - HERMES_HOME=/app/data
      - WEBHOOK_URL=http://api-server:3000/api/hermes/webhook
      - WEIXIN_DM_POLICY=open
      - WEIXIN_GROUP_POLICY=disabled
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
    restart: unless-stopped
    networks:
      - companion-net

  # ===========================================================================
  # Dashboard - React Admin SPA
  # ===========================================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: weclaw-dashboard
    restart: unless-stopped
    depends_on:
      - api-server
    networks:
      - companion-net

# =============================================================================
# 持久化卷
# =============================================================================
volumes:
  hermes_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  api_data:
    driver: local
  uploads_data:
    driver: local
  minio_data:
    driver: local

# =============================================================================
# 内部网络
# =============================================================================
networks:
  companion-net:
    driver: bridge
    name: weclaw-companion-net

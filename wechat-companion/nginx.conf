# =============================================================================
# 微信情感陪伴平台 - Nginx 反向代理配置
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # 性能优化
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 500m;  # 允许上传 200MB 文件

    # Gzip 压缩
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # Docker内部DNS，避免容器重启后IP缓存问题
    resolver 127.0.0.11 valid=30s;

    # =========================================================================
    # HTTP 服务 — 使用变量 proxy_pass 实现动态 DNS 解析
    # Docker 容器重启会变 IP，变量方式配合 resolver 可自动刷新
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # API 服务 (变量方式实现动态DNS)
        set $api_backend "http://api-server:3000";
        set $dashboard_backend "http://dashboard:80";
        set $openilink_backend "http://openilink-hub:9800";

        # 健康检查
        location /health {
            proxy_pass $api_backend;
            proxy_set_header Host $host;
        }

        # API 服务
        location /api/ {
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置 (导入大文件需要较长时间)
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Webhook (WeClaw 回调)
        location /webhook {
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 上传文件静态服务
        location /uploads/ {
            alias /var/www/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 表情包静态服务
        location /stickers/ {
            alias /usr/share/nginx/stickers/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 队列统计
        location /stats {
            proxy_pass $api_backend;
            proxy_set_header Host $host;
        }

        # Weixin Bridge — QR码展示 (从 weclaw-bridge 共享卷读取)
        set $weixin_bridge "http://weixin-bridge:3001";

        # 兼容旧前端接口: 原始 QR 文本
        location /bridge/weclaw-qr {
            proxy_pass $weixin_bridge;
            proxy_set_header Host $host;
        }

        # SVG 二维码 (微信可扫)
        location /qr.svg {
            proxy_pass $weixin_bridge;
            proxy_set_header Host $host;
        }

        # QR 文本
        location /qr {
            proxy_pass $weixin_bridge;
            proxy_set_header Host $host;
        }

        location /qr.txt {
            proxy_pass $weixin_bridge;
            proxy_set_header Host $host;
        }

        # MinIO 代理 — presigned URL 通过 nginx 访问
        location /minio/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 1g;
        }

        # Dashboard SPA — /bridge 由 React Router 处理
        location = /bridge {
            proxy_pass $dashboard_backend;
            proxy_set_header Host $host;
        }

        location = /bridge/ {
            rewrite ^ /bridge-gate.html break;
            proxy_pass $dashboard_backend;
        }

        # OpeniLink Hub 反向代理 (同源访问，解决iframe跨域cookie问题)
        # 注意：不用变量 proxy_pass，直接用服务名，避免 nginx 变量 DNS 解析问题
        location /openilink/ {
            proxy_pass http://openilink-hub:9800/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持 (扫码状态推送)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 传递 cookie 让 OpeniLink 保持登录状态
            proxy_set_header Cookie $http_cookie;

            # 禁用后端压缩，sub_filter 才能处理响应内容
            proxy_set_header Accept-Encoding "";

            # 注入 <base href> 让 JS 的相对/绝对路径都走 /openilink/ 代理
            sub_filter '<head>' '<head><base href="/openilink/">';
            # 重写 HTML 中的资源路径
            sub_filter '/assets/' '/openilink/assets/';
            sub_filter '/favicon.svg' '/openilink/favicon.svg';
            sub_filter_once off;

            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 30s;
        }

        # Dashboard SPA (must be after /bridge/)
        location / {
            proxy_pass $dashboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}